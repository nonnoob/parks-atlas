<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1f2a">
<meta name="description" content="A scratch-off atlas of the 63 U.S. National Parks — 美国国家公园打卡图鉴">
<title>美国国家公园打卡图鉴</title>
<style>
:root{--bg:#0b1f2a;--bg2:#0e2a38;--card:#13313f;--ink:#eaf2f0;--muted:#8fb3b0;--gold:#e7c06a;--gold2:#caa24a;--foil:#9fb0b8;--line:#23495a;--ok:#5ec88a;--warn:#f0a35e;--bad:#ef6f6f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#11364a 0%,var(--bg) 60%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
body{min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 8px)}
a{color:var(--gold)}
.wrap{max-width:760px;margin:0 auto;padding:14px}
header.bar{display:flex;align-items:center;gap:10px;padding:10px 14px;position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(11,31,42,.96),rgba(11,31,42,.7));backdrop-filter:blur(8px)}
.htitle{font-weight:800;font-size:16px;letter-spacing:.5px;white-space:nowrap;flex:0 0 auto;background:linear-gradient(180deg,#f7e6b8,#e7c06a 78%);-webkit-background-clip:text;background-clip:text;color:transparent}
.htitle small{display:block;font-weight:600;font-size:11px;color:var(--muted);letter-spacing:2px;white-space:nowrap}
.spacer{flex:1}
.iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .12s ease}
.iconbtn:active{transform:scale(.94)}
.iconbtn.gold{border-color:var(--gold2);color:var(--gold)}
/* progress */
.prog{margin:6px 14px 2px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px}
.prow{display:flex;align-items:baseline;gap:8px}
.big{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;background:linear-gradient(180deg,#f7e6b8,#e7c06a 72%);-webkit-background-clip:text;background-clip:text;color:transparent}
.of{font-size:14px;color:var(--muted);font-weight:700}
.tier{margin-left:auto;font-size:12px;font-weight:800;background:linear-gradient(180deg,var(--gold),var(--gold2));padding:4px 10px;border-radius:999px;color:#3a2a07;box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 1px 4px rgba(0,0,0,.25)}
.track{height:9px;background:#0c2531;border-radius:999px;margin-top:10px;overflow:hidden;border:1px solid var(--line)}
.fill{height:100%;width:0;background:linear-gradient(90deg,#5ec88a,#e7c06a,#f5dfa0,#e7c06a);background-size:220% 100%;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
@media (prefers-reduced-motion:no-preference){.fill{animation:sheen 3.4s linear infinite}}
@keyframes sheen{to{background-position:-220% 0}}
.sub{display:flex;gap:10px;flex-wrap:wrap;margin-top:9px;font-size:11px;color:var(--muted)}
.sub b{color:var(--ink)}
/* map */
.mapwrap{position:relative;margin:10px 14px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0d2734,#0b202c);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -34px 60px -34px rgba(0,0,0,.5),0 10px 30px -18px rgba(0,0,0,.6)}
svg#map{display:block;width:100%;height:auto;touch-action:manipulation}
.legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:8px 10px 12px;font-size:11px;color:var(--muted)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:-1px}
.maperr{padding:18px;text-align:center;color:var(--muted);font-size:13px}
/* list fallback / region chips */
.regions{margin:4px 14px 0;display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.regions::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:12px;color:var(--muted);font-weight:700;cursor:pointer;white-space:nowrap;transition:transform .12s ease,border-color .2s}
.chip:active{transform:scale(.95)}
.chip b{color:var(--gold)}
.chip.on{border-color:var(--gold2);color:var(--ink);box-shadow:0 0 0 1px rgba(202,162,74,.35),0 2px 10px rgba(231,192,106,.18)}
/* sheet / detail */
.scrim{position:fixed;inset:0;background:rgba(3,12,17,.6);backdrop-filter:blur(3px);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;max-width:760px;margin:0 auto;background:linear-gradient(180deg,#16384a,#102a37);border:1px solid var(--line);border-bottom:0;border-radius:20px 20px 0 0;padding:16px 16px calc(18px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .32s cubic-bezier(.2,.8,.2,1);max-height:88dvh;overflow:auto}
.sheet.show{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:99px;background:#2b5566;margin:0 auto 12px}
.pk-top{display:flex;align-items:center;gap:10px}
.pk-emoji{font-size:30px}
.pk-h1{font-size:20px;font-weight:900;line-height:1.15}
.pk-en{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.4px}
.pill{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px;margin:2px 4px 0 0}
.pill.state{background:#0d2531;border:1px solid var(--line);color:var(--muted)}
.pill.yr{background:#0d2531;border:1px solid var(--line);color:var(--muted)}
.pill.done{background:rgba(94,200,138,.16);border:1px solid #2f6f4d;color:var(--ok)}
.pill.tamper{background:rgba(239,111,111,.16);border:1px solid #6f2f2f;color:var(--bad)}
.intro{margin:12px 0 4px;font-size:14px;line-height:1.65;color:#dbe9e6}
.hl{margin-top:8px;font-size:13px;color:var(--muted)}
.hl b{color:var(--gold)}
.stampbox{margin-top:16px}
.holdbtn{position:relative;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:900;color:#3a2a07;background:linear-gradient(180deg,var(--gold),var(--gold2));cursor:pointer;overflow:hidden;letter-spacing:1px;user-select:none;touch-action:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 6px 18px -8px rgba(231,192,106,.5)}
.holdbtn .lab{position:relative;z-index:2}
.holdbtn .prog2{position:absolute;inset:0;background:rgba(255,255,255,.35);width:0;z-index:1}
.holdbtn.danger{background:linear-gradient(180deg,#2a4350,#1d3340);color:var(--ink);border:1px solid var(--line)}
.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
.note-in{width:100%;margin-top:10px;background:#0d2531;border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px;font-size:14px;font-family:inherit}
.stamp-anim{position:fixed;z-index:60;left:50%;top:42%;transform:translate(-50%,-50%) scale(2.6) rotate(-16deg);opacity:0;pointer-events:none;font-weight:900;color:#e9533b;border:4px solid #e9533b;border-radius:12px;padding:8px 16px;font-size:26px;letter-spacing:2px;text-transform:uppercase;mix-blend-mode:screen}
.stamp-anim.go{animation:stamp .9s ease forwards}
@keyframes stamp{0%{opacity:0;transform:translate(-50%,-50%) scale(2.6) rotate(-16deg)}18%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-16deg)}72%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05) rotate(-16deg)}}
/* modal (passphrase/share/help) */
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(3,12,17,.66);backdrop-filter:blur(3px)}
.modal.show{display:flex}
.mcard{width:100%;max-width:440px;background:linear-gradient(180deg,#16384a,#102a37);border:1px solid var(--line);border-radius:18px;padding:18px}
.mcard h3{margin:0 0 6px;font-size:17px}
.mcard p{margin:6px 0;font-size:13px;color:var(--muted);line-height:1.6}
.inp{width:100%;margin-top:10px;background:#0d2531;border:1px solid var(--line);border-radius:11px;color:var(--ink);padding:12px;font-size:15px;font-family:inherit}
.mbtns{display:flex;gap:10px;margin-top:14px}
.mbtns button{flex:1;border-radius:11px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink)}
.mbtns .pri{background:linear-gradient(180deg,var(--gold),var(--gold2));color:#3a2a07;border:none}
.share-out{width:100%;margin-top:10px;background:#0d2531;border:1px solid var(--line);border-radius:11px;color:var(--muted);padding:10px;font-size:11px;word-break:break-all;max-height:120px;overflow:auto}
.fp{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--gold);letter-spacing:1px}
.banner{margin:8px 14px 0;border-radius:12px;padding:10px 12px;font-size:12.5px;font-weight:700;display:none}
.banner.show{display:block}
.banner.ro{background:rgba(231,192,106,.12);border:1px solid var(--gold2);color:var(--gold)}
.banner.tamper{background:rgba(239,111,111,.12);border:1px solid #6f2f2f;color:var(--bad)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#0d2531;border:1px solid var(--line);color:var(--ink);padding:11px 16px;border-radius:12px;font-size:13px;font-weight:700;z-index:70;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{ text-align:center;color:#4f7480;font-size:11px;margin:18px 0 6px}
/* national map: states + labels + park markers */
.state{fill:#2a3942;stroke:#0b1f2a;stroke-width:.7;transition:fill .4s}
.state.clickable{cursor:pointer}
.state.has{fill:#33475220}
.state.lit{fill:#3a4a3f}
.state.done{fill:#4a5a3c}
.state:hover{fill:#3d525f}
.ab{fill:#aac7ce;font-size:12px;font-weight:800;text-anchor:middle;paint-order:stroke;stroke:#0b1f2a;stroke-width:2.5px;pointer-events:none}
.pmark{font-size:15px;text-anchor:middle;cursor:pointer;filter:grayscale(1) opacity(.6);transition:filter .5s}
.pmark.lit{filter:grayscale(0) opacity(1) drop-shadow(0 0 5px rgba(231,192,106,.95))}
.hintbar{ text-align:center;color:#6f99a4;font-size:12px;margin:2px 14px 0}
/* STATE VIEW */
#stateView{display:none;animation:fadein .3s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sv-head{display:flex;align-items:center;gap:12px;margin:6px 14px 4px}
.sv-back{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:14px;font-weight:800;cursor:pointer}
.sv-mascot{font-size:40px;line-height:1}
.sv-title{font-size:20px;font-weight:900}
.sv-title small{display:block;font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.5px}
.sv-sub{margin-left:auto;text-align:right;font-size:12px;color:var(--muted)}
.sv-sub b{color:var(--gold);font-size:18px}
.sv-stage{position:relative;margin:8px 14px;border:1px solid var(--line);border-radius:18px;background:radial-gradient(120% 100% at 50% 0%,#123040,#0c2230);overflow:hidden;min-height:300px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -34px 60px -34px rgba(0,0,0,.5),0 10px 30px -18px rgba(0,0,0,.6)}
.sv-bg{display:block;width:100%;height:auto}
.sv-bg path{fill:#16323f;stroke:#2c5566;stroke-width:1}
.sv-emptly{padding:46px 18px;text-align:center;color:var(--muted)}
.sv-emptly .big2{font-size:46px}
/* scratch medallion */
.medallion{position:absolute;transform:translate(-50%,-50%);text-align:center;touch-action:pinch-zoom;pointer-events:none}
.med-disc{position:relative;width:84px;height:84px;margin:0 auto;border-radius:50%;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.4),inset 0 0 0 2px rgba(231,192,106,.25);pointer-events:auto}
.med-base{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;background:radial-gradient(circle at 50% 38%,#1c4a3a,#10303f);filter:grayscale(1) brightness(.8);transition:filter .6s}
.med-base.color{filter:grayscale(0) brightness(1)}
.med-ring{position:absolute;inset:0;border-radius:50%;border:2px dashed rgba(159,176,184,.5);pointer-events:none}
.med-ring.done{border:2px solid var(--gold);box-shadow:0 0 10px rgba(231,192,106,.6)}
.med-canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;cursor:grab;touch-action:pinch-zoom;opacity:.6}
/* in-map detail callout (leader line) for the state view */
.sv-callout{position:absolute;z-index:20;width:210px;max-width:74%;background:linear-gradient(180deg,#16384a,#102a37);border:1px solid var(--gold2);border-radius:14px;padding:11px 12px 12px;box-shadow:0 12px 34px rgba(0,0,0,.55);animation:cfade .18s ease}
@keyframes cfade{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.sv-callout .cx{position:absolute;top:5px;right:9px;color:var(--muted);font-size:15px;font-weight:800;cursor:pointer;line-height:1}
.sv-callout .ct{display:flex;gap:8px;align-items:center;padding-right:14px}
.sv-callout .ce{font-size:22px;line-height:1}
.sv-callout .ch1{font-size:15px;font-weight:900;line-height:1.15}
.sv-callout .cen{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.3px}
.sv-callout .cintro{margin-top:7px;font-size:11.5px;line-height:1.5;color:#dbe9e6}
.sv-callout .chl{margin-top:5px;font-size:11px;color:var(--gold)}
.sv-callout .cstat{margin-top:8px;font-size:11.5px;font-weight:700}
.sv-callout .holdbtn{padding:9px;font-size:13px;margin-top:9px;letter-spacing:0}
.sv-cline{position:absolute;left:0;top:0;pointer-events:none;z-index:19;overflow:visible}
.med-canvas.armed{box-shadow:0 0 0 2px var(--gold) inset,0 0 10px rgba(231,192,106,.6)}
/* ===== phone layout ===== */
@media (max-width:640px){
  header.bar{gap:7px;padding:9px 11px}
  .htitle{font-size:15px}
  .htitle small{letter-spacing:1px;font-size:9.5px}
  .iconbtn{padding:7px 9px;font-size:12px}
  .prog{margin:6px 11px 2px;padding:11px 13px}
  .big{font-size:26px}
  .regions{margin:7px 11px 0}
  /* national view: one full-screen framed scratch card */
  #nationalView .mapwrap{margin:8px;display:flex;flex-direction:column;min-height:calc(100dvh - 212px);background:radial-gradient(125% 78% at 50% 30%,#123b50 0%,#0b1f2b 76%)}
  #nationalView #mapHost{flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-height:0}
  #nationalView #mapHost svg{width:100%;height:auto;display:block}
  .legend{padding:6px 10px 12px}
  .ab{font-size:17px;stroke-width:3px}
  .pmark{font-size:22px}
  .pmark.lit{filter:grayscale(0) opacity(1) drop-shadow(0 0 6px rgba(231,192,106,1))}
  /* state view a touch tighter */
  .sv-head{margin:6px 11px 4px}
  .sv-stage{margin:8px 11px}
}
</style>
</head>
<body>
<header class="bar">
  <div class="htitle" id="htitle">国家公园图鉴<small id="htsub">U.S. NATIONAL PARKS</small></div>
  <div class="spacer"></div>
  <button class="iconbtn" id="btnLang">🌐 EN</button>
  <button class="iconbtn" id="btnSound">🔊</button>
  <button class="iconbtn" id="btnShare">分享</button>
</header>

<div id="banner" class="banner"></div>

<div class="prog">
  <div class="prow"><span class="big" id="cnt">0</span><span class="of" id="of">/ 63 座</span><span class="tier" id="tier"></span></div>
  <div class="track"><div class="fill" id="fill"></div></div>
  <div class="sub" id="subrow"></div>
</div>

<div class="regions" id="regions"></div>

<div id="nationalView">
  <div class="mapwrap">
    <div id="mapHost"></div>
    <div class="legend">
      <span><i style="background:var(--foil)"></i><span id="legendOff">未点亮</span></span>
      <span><i style="background:var(--gold)"></i><span id="legendOn">已点亮</span></span>
    </div>
  </div>
</div>

<div id="stateView"></div>

<div class="foot" id="foot"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<div class="modal" id="modal"><div class="mcard" id="mcard"></div></div>
<div class="toast" id="toast"></div>

<script src="d3.min.js?v=1"></script>
<script src="topojson.min.js?v=1"></script>
<script src="config.js?v=1"></script>
<script src="data.js?v=1"></script>
<script src="i18n.js?v=1"></script>
<script src="ledger.js?v=1"></script>
<script src="scratchable.js?v=1"></script>
<script src="app.js?v=1"></script>
<script>
try{const mf={name:'Parks Atlas',short_name:'Parks Atlas',start_url:'.',display:'standalone',background_color:'#0b1f2a',theme_color:'#0b1f2a',icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#0b1f2a"/><text x="50%" y="54%" font-size="300" text-anchor="middle" dominant-baseline="middle">🏞️</text></svg>'),sizes:'512x512',type:'image/svg+xml'}]};const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));document.head.appendChild(l);}catch(e){}
if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
